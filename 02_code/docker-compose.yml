services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: broadband_postgis
    environment:
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis
      POSTGRES_DB: broadband
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: "1gb"   # headroom for indexing the ~9.9M building layer

volumes:
  pgdata:
